# Development — `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`
# (NOT auto-merged: kept out of the default override name so `spawn`'s plain
# `docker compose up` deploys the prod image without these dev-only ports/mounts.)
# Mount the entire working copy in read-only so any new simulator folder
# is picked up automatically (no compose edit needed when adding a simu).
# Hidden files (.git, .claude…) and dev plumbing are blocked by nginx.conf.
services:
  web:
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      # Hot-reload nginx config: edit local nginx.conf → `docker compose exec web nginx -s reload`
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
