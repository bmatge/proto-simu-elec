server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default site-wide caching policy — short for HTML, long for fingerprinted assets below.
    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for shared assets (CSS/JS/images) — they rarely change.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Manifest must stay fresh so the portal home / portal bar pick up new simulators.
    location = /shared/simulators.json {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Health check used by deploy.sh / monitoring.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Gzip text payloads.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_vary on;

    # Hide nginx version in headers.
    server_tokens off;
}
